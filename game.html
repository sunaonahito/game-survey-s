<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Straying - ゲーム体験前のご案内</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Noto Sans JP', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(ellipse at top right, rgba(91, 138, 240, 0.15), transparent 50%),
                              radial-gradient(ellipse at bottom left, rgba(232, 164, 74, 0.1), transparent 50%);
        }
        .container {
            width: 90%;
            max-width: 640px;
            background: rgba(22, 27, 34, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h1 {
            color: #ffffff;
            font-size: 28px;
            margin: 0 0 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        p {
            line-height: 1.8;
            margin: 0 0 20px;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
        }
        .code-box {
            background: rgba(91, 138, 240, 0.1);
            border: 1.5px solid rgba(91, 138, 240, 0.4);
            border-radius: 12px;
            padding: 24px;
            margin: 30px 0;
        }
        .code-box-title {
            font-size: 13px;
            color: rgba(91, 138, 240, 0.9);
            margin-bottom: 8px;
            font-weight: bold;
        }
        .code-value {
            font-size: 32px;
            font-weight: bold;
            font-family: monospace, sans-serif;
            color: #ffffff;
            letter-spacing: 4px;
            margin: 0;
        }
        .code-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 12px;
            line-height: 1.6;
        }
        .start-btn {
            display: inline-block;
            background: linear-gradient(135deg, #5B8AF0, #2B5EA7);
            color: #ffffff;
            font-size: 16px;
            font-weight: bold;
            padding: 16px 40px;
            border-radius: 30px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(91, 138, 240, 0.4);
            transition: all 0.3s;
            margin-top: 10px;
        }
        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(91, 138, 240, 0.6);
            background: linear-gradient(135deg, #6b98fc, #3468b8);
        }
        .info-list {
            text-align: left;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px 30px;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .info-list ul {
            margin: 0;
            padding-left: 20px;
        }
        .info-list li {
            font-size: 14px;
            line-height: 1.8;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.85);
        }
        .info-list li:last-child {
            margin-bottom: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Straying</h1>
        <p>これより、ゲーム体験へ移ります。<br>プレイ時間は約20分〜30分を予定しています。</p>

        <div style="margin: 40px 0;">
            <p style="font-size: 15px; color: rgba(255, 255, 255, 0.95); margin-bottom: 6px; font-weight: 700;">あなたの匿名コードが自動入力されています</p>
            <p style="font-size: 13px; color: rgba(255, 255, 255, 0.65); margin-bottom: 12px;">先ほど作成したコードと一致していることを確認してください</p>
            <input type="text" id="codeInput" placeholder="例： 0315-BFA" value="" style="
                width: 100%;
                max-width: 320px;
                padding: 16px 20px;
                font-size: 24px;
                font-weight: bold;
                font-family: monospace, sans-serif;
                letter-spacing: 4px;
                color: #ffffff;
                background: rgba(255, 255, 255, 0.08);
                border: 1.5px solid rgba(91, 138, 240, 0.5);
                border-radius: 12px;
                text-align: center;
                outline: none;
                transition: all 0.3s;
                box-sizing: border-box;
            " onfocus="this.style.borderColor='#5B8AF0'; this.style.boxShadow='0 0 0 3px rgba(91,138,240,0.3)';" 
              onblur="this.style.borderColor='rgba(91, 138, 240, 0.5)'; this.style.boxShadow='none';">
        </div>

        <div class="info-list">
            <ul>
                <li>「ゲームを始める」を押すと別タブでゲーム画面が開きます。</li>
                <li>ゲーム内での操作や進め方は自由です。あなたの感じたままに進めてください。</li>
                <li>ゲームの体験を終えましたら、元のアンケートポータルへ戻り、体験後の質問にご回答をお願いいたします。</li>
            </ul>
        </div>

        <button onclick="startGame()" class="start-btn">ゲームを始める</button>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwmCBURkSOU-2zMqJs9KNaeU8goohM0bSIsklu7oxyDhJQtLj6GEKa1TMVmAm3NRgoYQg/exec";

        window.addEventListener("DOMContentLoaded", function() {
            const urlParams = new URLSearchParams(window.location.search);
            let code = urlParams.get('code');
            if (!code) {
                try { code = localStorage.getItem("survey_anon_code"); } catch(e) {}
            }
            if (code) {
                document.getElementById('codeInput').value = code;
            }
        });

        function startGame() {
            const code = document.getElementById('codeInput').value.trim();
            const ts = new Date().toISOString();
            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({
                    type: 'game',
                    game: 'Straying',
                    anonymousCode: code,
                    timestamp: ts,
                    startTime: ts,
                    endTime: '',
                    stage1_cards: [],
                    stage2_stories: [],
                    stage3_lostCards: [],
                    special_recipientName: '',
                    special_message: ''
                })
            }).catch(function(){});
            window.location.href = 'https://solventer.jp/Straying_Ex/';
        }
    </script>
</body>
</html>
